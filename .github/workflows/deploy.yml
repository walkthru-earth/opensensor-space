name: Deploy to GitHub Pages

# Triggers:
#   - push to main (only when site-relevant paths change)
#   - daily cron to refresh hourly aggregates with newer S3 telemetry
#   - manual dispatch
on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - 'components/**'
      - 'sources/**'
      - 'static/**'
      - 'scripts/**'
      - 'evidence.config.yaml'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy.yml'
  schedule:
    - cron: '0 1 * * *'   # daily 01:00 UTC
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache DuckDB CLI
        id: cache-duckdb
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/duckdb
          key: duckdb-cli-1.4.2-linux-amd64

      - name: Setup DuckDB
        if: steps.cache-duckdb.outputs.cache-hit != 'true'
        run: |
          curl -L https://github.com/duckdb/duckdb/releases/download/v1.4.2/duckdb_cli-linux-amd64.zip -o duckdb.zip
          unzip duckdb.zip
          chmod +x duckdb
          sudo mv duckdb /usr/local/bin/

      - name: Sync stations from contributions branch
        run: |
          git fetch origin contributions --depth=1
          git checkout origin/contributions -- content/stations 2>/dev/null || echo "No stations on contributions branch"
          if [ -d "content/stations" ]; then
            duckdb -c ".read sources/stations/sync-yaml-to-csv.sql"
          fi

      - name: Cache Evidence source output
        uses: actions/cache@v4
        with:
          path: .evidence/template/static/data
          key: evidence-sources-${{ hashFiles('sources/**', 'content/stations/**') }}
          restore-keys: evidence-sources-

      - name: Build
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: |
          bun run sources
          bun run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/${{ github.event.repository.name }}'

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
